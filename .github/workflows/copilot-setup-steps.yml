name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup steps work),
# and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name MUST be `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the same container image used by the production CI workflow
      # (.github/workflows/jekyll.yml) and by local devcontainer users, so
      # the agent builds the site exactly the same way.
      - name: Build devcontainer image
        run: docker build -t jekyll-build .devcontainer

      # Pre-install the site's gems inside the image so the agent does not
      # have to wait for `bundle install` on first build. Mount the repo so
      # the resulting vendor/bundle is reused later.
      - name: Pre-install gems
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/srv/jekyll" \
            -w /srv/jekyll \
            jekyll-build \
            bash -c "bundle config set --local path vendor/bundle && bundle install"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install Playwright and the Chromium browser used for screenshotting.
      - name: Install Playwright and Chromium
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium
