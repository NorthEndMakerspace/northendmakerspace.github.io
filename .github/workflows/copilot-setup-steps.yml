name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build devcontainer image
        run: docker build -t jekyll-build .devcontainer
      - name: Install dependencies
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/srv/jekyll" \
            -w /srv/jekyll \
            jekyll-build \
            bundle install
