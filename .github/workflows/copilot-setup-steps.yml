name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup steps work),
# and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name MUST be `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # libvips is required by the jekyll_picture_tag gem used in this site.
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libvips libvips-dev

      - name: Set up Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install Playwright and the Chromium browser used for screenshotting.
      - name: Install Playwright and Chromium
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium
